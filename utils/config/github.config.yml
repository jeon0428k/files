github:
  token: "YOUR_GITHUB_TOKEN"
  base_url: "https://github.yourcompany.com/api/v3"
  timeout: 30
  user_agent: "python-github-api-client"
  accept: "application/vnd.github+json"
  auto_rate_limit_wait: true
  max_retries: 3
  retry_backoff_sec: 1.0

  proxy:
    http: "http://proxy.yourcompany.com:8080"
    https: "http://proxy.yourcompany.com:8080"
    no_proxy: "localhost,127.0.0.1,.yourcompany.com"
    verify_ssl: true
    ca_bundle: ""